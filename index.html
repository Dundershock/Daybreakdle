<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daybreakdle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <img src="assets/images/daybreakdle.png" alt="Daybreakdle" id="logo">
  <p>Guess the survivor! Each box will tell you if you need higher or lower in a stat, or if it's incorrect/correct.</p>

  <div class="autocomplete-container">
  <input type="text" id="guess-input" placeholder="Enter survivor name..." autocomplete="off">
  <ul id="suggestions"></ul>
  </div>
  <button id="guess-btn">Guess</button>

  <div id="board"></div>
  <div class="footer"><img src="assets/images/cupoftea.png" alt="Tea Drinker icon"></div>

  <div id="win-screen" class="win-screen-window hidden">
  <div class="win-screen-content">
    <h2 id="win-title">Correct!</h2>
    <p id="win-text"></p>
    <button onclick="closeWinScreen()">Close</button>
  </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
