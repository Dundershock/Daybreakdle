<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daybreakdle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

  <!--Discord / social embed -->
  <meta name="theme-color" content="#ee444a" />
  <meta property="og:site_name" content="Daybreakdle" />
  <meta property="og:title" content="Daybreakdle" />
  <meta property="og:description" content="Guess the survivor! A Wordle-style Daybreak guessing game." />
  <meta property="og:image" content="https://dundershock.github.io/Daybreakdle/assets/images/daybreakdle.png" />
  <meta property="og:url" content="https://dundershock.github.io/Daybreakdle/" />
  <meta property="og:type" content="website" />
</head>
<body>
  <div id="page">
    <img src="assets/images/daybreakdle.png" alt="Daybreakdle" id="logo">
    <p>Guess the survivor! Each box will tell you if you need higher or lower in a stat, or if it's incorrect/correct.</p>
  
    <div class="autocomplete-container">
    <input type="text" id="guess-input" placeholder="Enter survivor name..." autocomplete="off">
    <ul id="suggestions"></ul>
    </div>
    <button id="guess-btn">Guess</button>
  
    <div id="board"></div>
  
    <div id="win-screen" class="win-screen-window hidden">
    <div class="win-screen-content">
      <h2 id="win-title">Correct!</h2>
      <p id="win-text"></p>
      <button onclick="closeWinScreen()">Close</button>
    </div>
    </div>
  </div>

  <div class="footer">
    <div>
    <span>Made by <a href="https://www.youtube.com/@teadrinker_">Dundereshock</a></span>
    <span>Based on the ROBLOX game, <a href="https://www.roblox.com/games/6870736769/Daybreak">Daybreak</a>.</span>
    </div>
    <a href="https://www.youtube.com/@teadrinker_"><img src="assets/images/cupoftea.png" alt="Tea Drinker icon"></a>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
