<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daybreakdle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <img src="assets/images/logo.png" alt="Daybreakdle" id="logo">
  <p>Guess the survivor! Each box will tell you if you need higher or lower in a stat, or if it's correct.</p>

  <div class="autocomplete-container">
  <input type="text" id="guess-input" placeholder="Enter survivor name" autocomplete="off">
  <ul id="suggestions"></ul>
  </div>
  <button id="guess-btn">Guess</button>

  <div id="board"></div>

  <script src="script.js"></script>
</body>
</html>
