<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daybreakdle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Daybreakdle</h1>
  <p>Guess the survivor! Each box will tell you if you need higher, lower, or if it's correct.</p>

  <div class="autocomplete-container">
  <input type="text" id="guess-input" placeholder="Enter survivor name" autocomplete="off">
  <ul id="suggestions"></ul>
  </div>
  <button id="guess-btn">Guess</button>

  <div id="board"></div>

  <script src="script.js"></script>
</body>
</html>
